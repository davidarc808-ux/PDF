version: '3.1'

services:
  db:
    image: postgres:15
    container_name: pdf_ventas_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - db_data:/var/lib/postgresql/data

  odoo:
    image: odoo:19
    container_name: pdf_ventas_odoo
    depends_on:
      - db
    ports:
      - "8075:8069"
    volumes:
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo

volumes:
  db_data: